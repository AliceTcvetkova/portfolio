<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#20372f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Eco Clean Map — turn polluted places into cleanup quests.">
  <title>Eco Clean Map</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <main id="phone" class="phone" aria-live="polite"></main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside id="install-banner" class="install-banner" aria-label="Install app">
    <p id="install-text"></p>
    <button type="button" id="install-btn" class="btn btn--primary"></button>
    <button type="button" id="install-dismiss" class="btn btn--secondary"></button>
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
